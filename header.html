<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traction Stream Header</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1e2d40; }
  </style>
</head>
<body>
  <div style="background:#1e2d40; padding:0; margin:0; width:100%;">
    <div style="max-width:1100px; margin:0 auto; padding:20px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap;">
      <!-- Logo -->
      <div style="display:flex; align-items:center; gap:12px;">
        <div style="width:36px; height:36px; background:#b8913a; border-radius:4px; display:flex; align-items:center; justify-content:center;">
          <span style="font-family:'DM Serif Display', serif; font-size:22px; color:#ffffff; font-weight:700; line-height:1;">T</span>
        </div>
        <a href="https://tractionstream.com/" style="text-decoration:none;" draggable="false">
          <span style="font-family:'DM Serif Display', serif; font-size:24px; color:#ffffff; letter-spacing:0.5px;">Traction</span>
          <span style="font-family:'DM Serif Display', serif; font-size:24px; color:#b8913a; letter-spacing:0.5px;"> Stream</span>
        </a>
      </div>
      <!-- Navigation -->
      <nav style="display:flex; align-items:center; gap:32px; flex-wrap:wrap;">
        <a href="https://tractionstream.com/" style="font-family:'DM Sans', sans-serif; font-size:14px; font-weight:500; color:#b0bfcf; text-decoration:none; letter-spacing:0.5px; transition:color 0.2s;" onmouseover="this.style.color='#ffffff'" onmouseout="this.style.color='#b0bfcf'" draggable="false">Home</a>
        <a href="https://tractionstream.com/about-us/" style="font-family:'DM Sans', sans-serif; font-size:14px; font-weight:500; color:#b0bfcf; text-decoration:none; letter-spacing:0.5px; transition:color 0.2s;" onmouseover="this.style.color='#ffffff'" onmouseout="this.style.color='#b0bfcf'" draggable="false">About</a>
        <a href="https://tractionstream.com/blog/" style="font-family:'DM Sans', sans-serif; font-size:14px; font-weight:500; color:#b0bfcf; text-decoration:none; letter-spacing:0.5px; transition:color 0.2s;" onmouseover="this.style.color='#ffffff'" onmouseout="this.style.color='#b0bfcf'" draggable="false">Blog</a>
        <a href="https://tractionstream.com/contact/" style="font-family:'DM Sans', sans-serif; font-size:14px; font-weight:500; color:#b0bfcf; text-decoration:none; letter-spacing:0.5px; transition:color 0.2s;" onmouseover="this.style.color='#ffffff'" onmouseout="this.style.color='#b0bfcf'" draggable="false">Contact</a>
      </nav>
    </div>
    <!-- Gold accent line -->
    <div style="height:3px; background:linear-gradient(90deg, #b8913a 0%, #d4a94e 50%, #b8913a 100%);"></div>
  </div>
</body>
</html>
